<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Clip-Path Editor — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">✂</span>
                <div class="title-col">
                    <h1>CSS Clip-Path Editor</h1>
                    <p class="tagline">Polygonal cropping coordinator exporting clip-path codes.</p>
                </div>
            </div>
            <div class="badge">css</div>
        </header>

        <main class="workspace-card">
            
            <div style="display:flex; justify-content:center; padding:20px 0;">
                <div id="clip-box" style="width:120px; height:120px; background:var(--accent); transition: clip-path 0.2s;"></div>
            </div>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button class="btn" onclick="setClip('polygon(50% 0%, 0% 100%, 100% 100%)')">Triangle</button>
                <button class="btn btn-secondary" onclick="setClip('polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)')">Pentagon</button>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
